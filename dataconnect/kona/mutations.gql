# Kona production connector — mutations
# @auth: USER (tenant), platform expr, PUBLIC (bot only), NO_ACCESS (Admin SDK / webhook)
# @transaction where plan requires (e.g. webhook Create Client + Config)

# --- Platform owner profile (AuthGuard / first login) ---
mutation UpsertPlatformOwner($email: String, $displayName: String) @auth(level: USER) {
  platformOwner_upsert(data: { id_expr: "auth.uid", email: $email, displayName: $displayName })
}

# --- Tenant: create client (linkedAuthUid = auth.uid) ---
mutation CreateClient(
  $companyName: String
  $clientName: String
  $email: String
  $industry: String
) @auth(level: USER) {
  client_insert(
    data: {
      linkedAuthUid_expr: "auth.uid"
      companyName: $companyName
      clientName: $clientName
      email: $email
      industry: $industry
      subscriptionStatus: "inactive"
    }
  )
}

# --- Tenant: update client (only if owner) ---
mutation UpdateClient(
  $id: UUID!
  $companyName: String
  $clientName: String
  $email: String
  $industry: String
  $subscriptionStatus: String
  $paddleSubscriptionId: String
) @auth(level: USER) {
  client_update(
    first: { where: { id: { eq: $id }, linkedAuthUid: { eq_expr: "auth.uid" } } }
    data: {
      companyName: $companyName
      clientName: $clientName
      email: $email
      industry: $industry
      subscriptionStatus: $subscriptionStatus
      paddleSubscriptionId: $paddleSubscriptionId
    }
  )
}

# --- Tenant: create bot config (verify client ownership in transaction) ---
mutation CreateClientAiBotConfig(
  $clientId: UUID!
  $botName: String
  $accessToken: String!
  $aiModelApiKey: String
  $schedulingApiKey: String
  $knowledgeBaseJson: Any
  $welcomeMessage: String
  $customInstructions: String
) @auth(level: USER) @transaction {
  query @redact {
    client(id: $clientId) @check(expr: "this != null && this.linkedAuthUid == auth.uid", message: "Forbidden") {
      id
    }
  }
  clientAiBotConfig_insert(
    data: {
      clientId: $clientId
      botName: $botName
      accessToken: $accessToken
      aiModelApiKey: $aiModelApiKey
      schedulingApiKey: $schedulingApiKey
      knowledgeBaseJson: $knowledgeBaseJson
      welcomeMessage: $welcomeMessage
      customInstructions: $customInstructions
    }
  )
}

# --- Tenant: update bot config (only if client owned) ---
mutation UpdateClientAiBotConfig(
  $id: UUID!
  $botName: String
  $aiModelApiKey: String
  $schedulingApiKey: String
  $knowledgeBaseJson: Any
  $welcomeMessage: String
  $customInstructions: String
) @auth(level: USER) {
  clientAiBotConfig_update(
    first: {
      where: {
        id: { eq: $id }
        client: { linkedAuthUid: { eq_expr: "auth.uid" } }
      }
    }
    data: {
      botName: $botName
      aiModelApiKey: $aiModelApiKey
      schedulingApiKey: $schedulingApiKey
      knowledgeBaseJson: $knowledgeBaseJson
      welcomeMessage: $welcomeMessage
      customInstructions: $customInstructions
    }
  )
}

# --- Public (bot/embed): capture lead ---
mutation CreateClientInboundContact(
  $clientId: UUID!
  $companyName: String
  $websiteUrl: String
  $contactEmail: String
  $contactStatus: String
  $initialPitchDraft: String
  $identifiedPainPoints: String
) @auth(level: PUBLIC, insecureReason: "Bot/embed captures lead; clientId from validated config.") {
  clientInboundContact_insert(
    data: {
      clientId: $clientId
      companyName: $companyName
      websiteUrl: $websiteUrl
      contactEmail: $contactEmail
      contactStatus: $contactStatus
      initialPitchDraft: $initialPitchDraft
      identifiedPainPoints: $identifiedPainPoints
    }
  )
}

# --- Tenant: update inbound contact (only if client owned) ---
mutation UpdateClientInboundContact(
  $id: UUID!
  $companyName: String
  $websiteUrl: String
  $contactStatus: String
  $contactEmail: String
  $initialPitchDraft: String
  $identifiedPainPoints: String
) @auth(level: USER) {
  clientInboundContact_update(
    first: {
      where: { id: { eq: $id }, client: { linkedAuthUid: { eq_expr: "auth.uid" } } }
    }
    data: {
      companyName: $companyName
      websiteUrl: $websiteUrl
      contactStatus: $contactStatus
      contactEmail: $contactEmail
      initialPitchDraft: $initialPitchDraft
      identifiedPainPoints: $identifiedPainPoints
    }
  )
}

# --- Platform: create platform inbound contact ---
mutation CreatePlatformInboundContact(
  $companyName: String
  $websiteUrl: String
  $contactStatus: String
  $contactEmail: String
  $initialPitchDraft: String
  $identifiedPainPoints: String
  $nativeAgent: Boolean
) @auth(expr: "auth.uid != nil && auth.token.email == 'jakwakwa@gmail.com'") {
  platformInboundContact_insert(
    data: {
      companyName: $companyName
      websiteUrl: $websiteUrl
      contactStatus: $contactStatus
      contactEmail: $contactEmail
      initialPitchDraft: $initialPitchDraft
      identifiedPainPoints: $identifiedPainPoints
      nativeAgent: $nativeAgent
    }
  )
}

