# --- Admin SDK only: create client + bot config in one transaction (webhook) ---
mutation WebhookCreateClientWithConfig(
  $linkedAuthUid: String!
  $companyName: String
  $clientName: String
  $email: String
  $subscriptionStatus: String!
  $paddleSubscriptionId: String
  $botName: String
  $accessToken: String!
  $aiModelApiKey: String
  $welcomeMessage: String
  $customInstructions: String
) @auth(level: NO_ACCESS) @transaction {
  client_insert(
    data: {
      linkedAuthUid: $linkedAuthUid
      companyName: $companyName
      clientName: $clientName
      email: $email
      subscriptionStatus: $subscriptionStatus
      paddleSubscriptionId: $paddleSubscriptionId
    }
  )
  clientAiBotConfig_insert(
    data: {
      clientId_expr: "response.client_insert.id"
      botName: $botName
      accessToken: $accessToken
      aiModelApiKey: $aiModelApiKey
      welcomeMessage: $welcomeMessage
      customInstructions: $customInstructions
    }
  )
}

