# --- Public (bot): create conversation ---
mutation CreateClientConversation($clientId: UUID!, $accessToken: String!, $messages: Any) @auth(level: PUBLIC, insecureReason: "Bot creates conversation; restricted by clientId and accessToken.") {
  clientConversation_insert(
    data: {
      clientId: $clientId
      accessToken: $accessToken
      messages: $messages
    }
  )
}

# --- Public (bot): update conversation (by id + accessToken) ---
mutation UpdateClientConversation($id: UUID!, $accessToken: String!, $messages: Any) @auth(level: PUBLIC, insecureReason: "Bot updates conversation; restricted by id and accessToken.") {
  clientConversation_update(
    first: { where: { id: { eq: $id }, accessToken: { eq: $accessToken } } }
    data: { messages: $messages, updatedAt_expr: "request.time" }
  )
}

