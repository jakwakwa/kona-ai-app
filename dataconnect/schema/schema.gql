# Kona AI — Data Connect schema (replaces Firestore)
# Platform (CEO) and Client (tenant) models; see migration plan for Firestore mapping.

# --- Platform (single-tenant platform owner) ---

type PlatformOwner @table(key: "id") {
  id: String! @default(expr: "auth.uid")
  email: String
  displayName: String
  createdAt: Timestamp! @default(expr: "request.time")
}

type PlatformChatbotConfig @table {
  id: UUID! @default(expr: "uuidV4()")
  botName: String
  aiModelApiKey: String
  schedulingApiKey: String
  knowledgeBaseJson: Any
  welcomeMessage: String
  customInstructions: String
  createdAt: Timestamp! @default(expr: "request.time")
  platformOwner: PlatformOwner
}

type PlatformInboundContact @table {
  id: UUID! @default(expr: "uuidV4()")
  companyName: String
  websiteUrl: String
  contactStatus: String
  contactEmail: String
  initialPitchDraft: String
  identifiedPainPoints: String
  nativeAgent: Boolean
  createdAt: Timestamp! @default(expr: "request.time")
}

type PlatformOutboundContact @table {
  id: UUID! @default(expr: "uuidV4()")
  scrapedData: Any
  hasExistingAI: Boolean
  auditDate: Date
  aiDetectionDetails: Any
  createdAt: Timestamp! @default(expr: "request.time")
}

type PlatformOutboundOutreachEvent @table {
  id: UUID! @default(expr: "uuidV4()")
  platformOutboundContact: PlatformOutboundContact! @ref(constraintName: "pooe_poc_fkey")
  outreachType: String
  status: String
  sendDate: Date
  messageContent: String
  adminNotes: String
  createdAt: Timestamp! @default(expr: "request.time")
}

type PlatformAgentActivity @table {
  id: UUID! @default(expr: "uuidV4()")
  occurredAt: Timestamp! @default(expr: "request.time")
  agentType: String
  action: String
  targetUrl: String
  outcome: String
  tokensUsed: Int
  durationMs: Int
  metadata: Any
  platformOutboundContact: PlatformOutboundContact @ref(constraintName: "paa_poc_fkey")
  platformInboundContact: PlatformInboundContact @ref(constraintName: "paa_pic_fkey")
  platformOutboundOutreachEvent: PlatformOutboundOutreachEvent @ref(constraintName: "paa_pooe_fkey")
}

# --- Client (tenant) ---

type Client @table {
  id: UUID! @default(expr: "uuidV4()")
  linkedAuthUid: String!
  companyName: String
  clientName: String
  email: String
  industry: String
  subscriptionStatus: String
  paddleSubscriptionId: String
  createdAt: Timestamp! @default(expr: "request.time")
  convertedFromInboundContact: PlatformInboundContact
  convertedFromOutboundContact: PlatformOutboundContact
}

type ClientAiBotConfig @table {
  id: UUID! @default(expr: "uuidV4()")
  client: Client!
  botName: String
  accessToken: String!
  aiModelApiKey: String
  schedulingApiKey: String
  knowledgeBaseJson: Any
  welcomeMessage: String
  customInstructions: String
  createdAt: Timestamp! @default(expr: "request.time")
}

type ClientInboundContact @table {
  id: UUID! @default(expr: "uuidV4()")
  client: Client!
  companyName: String
  websiteUrl: String
  contactStatus: String
  contactEmail: String
  initialPitchDraft: String
  identifiedPainPoints: String
  createdAt: Timestamp! @default(expr: "request.time")
}

type ClientAiBotPerformanceEvent @table {
  id: UUID! @default(expr: "uuidV4()")
  client: Client!
  occurredAt: Timestamp! @default(expr: "request.time")
  eventType: String
  sessionDurationMs: Int
  messageCount: Int
  tokensUsed: Int
  metadata: Any
  clientInboundContact: ClientInboundContact
}

type ClientConversation @table {
  id: UUID! @default(expr: "uuidV4()")
  client: Client!
  clientAiBotConfig: ClientAiBotConfig
  accessToken: String!
  messages: Any
  createdAt: Timestamp! @default(expr: "request.time")
  updatedAt: Timestamp! @default(expr: "request.time")
}
